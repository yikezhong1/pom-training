<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>POM换料常见问题 · 交互动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:28px 20px;text-align:center}
.header h1{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px}
.header p{font-size:14px;color:#93c5fd}
.nav{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:14px;background:#1e293b;border-bottom:1px solid #334155}
.nav-btn{padding:7px 14px;border-radius:8px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.nav-btn:hover{border-color:#60a5fa;color:#60a5fa}
.nav-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.main{max-width:920px;margin:0 auto;padding:20px}
.scene{display:none}
.scene.active{display:block}
.scenario-box{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:16px}
.scenario-box h3{font-size:18px;color:#60a5fa;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.scenario-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;margin-bottom:8px}
.scenario-tag.red{background:#7f1d1d;color:#fca5a5}
.canvas-wrap{background:#1e293b;border-radius:12px;overflow:hidden;margin-bottom:16px;border:1px solid #334155}
canvas{display:block;width:100%;height:auto}
.info-panel{background:#1e293b;border-radius:12px;padding:22px;border:1px solid #334155;margin-bottom:16px}
.info-panel h3{font-size:17px;color:#60a5fa;margin-bottom:10px}
.info-panel p{font-size:14px;line-height:1.8;color:#cbd5e1}
.tip{background:#172554;border:1px solid #1e40af;border-radius:8px;padding:14px 18px;font-size:13px;line-height:1.7;color:#93c5fd;margin-top:12px}
.tip strong{color:#60a5fa}
.step-nav{display:flex;gap:10px;margin-top:16px;justify-content:center;align-items:center;flex-wrap:wrap}
.step-btn{padding:10px 24px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.step-btn.prev{background:#334155;color:#94a3b8}
.step-btn.next{background:#2563eb;color:#fff}
.step-btn:hover{opacity:.85}
.step-indicator{display:flex;gap:6px;align-items:center}
.step-dot{width:8px;height:8px;border-radius:50%;background:#475569}
.step-dot.active{background:#2563eb;width:24px;border-radius:4px}
.progress-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;background:#1e293b;border-bottom:1px solid #334155;font-size:13px;color:#94a3b8;flex-wrap:wrap}
.progress-bar .stat{display:flex;align-items:center;gap:4px}
.progress-bar .stat-val{color:#60a5fa;font-weight:700}
.wrong-btn{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.wrong-btn:hover{background:#991b1b}
.wrong-btn .badge{background:#ef4444;color:#fff;border-radius:50%;padding:1px 6px;font-size:11px;margin-left:4px}
.quiz-box{background:#172554;border:1px solid #1e40af;border-radius:12px;padding:20px;margin-top:16px}
.quiz-box h4{font-size:15px;color:#93c5fd;margin-bottom:14px;line-height:1.6}
.quiz-option{display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#cbd5e1;cursor:pointer;font-size:14px;line-height:1.5;transition:all .2s}
.quiz-option:hover{border-color:#60a5fa;background:#1e3a5f}
.quiz-option.correct{border-color:#22c55e;background:#14532d;color:#86efac}
.quiz-option.wrong{border-color:#ef4444;background:#7f1d1d;color:#fca5a5}
.quiz-option.disabled{cursor:default;opacity:.7}
.quiz-option.disabled:hover{border-color:#334155;background:#1e293b}
.quiz-option.correct.disabled:hover{border-color:#22c55e;background:#14532d}
.quiz-option.wrong.disabled:hover{border-color:#ef4444;background:#7f1d1d}
.quiz-feedback{margin-top:12px;padding:14px;border-radius:8px;font-size:13px;line-height:1.7}
.quiz-feedback.correct{background:#14532d;border:1px solid #22c55e;color:#86efac}
.quiz-feedback.wrong{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5}
.wrong-panel{max-width:920px;margin:0 auto;padding:20px}
.wrong-panel .wrong-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.wrong-panel .wrong-header h3{font-size:18px;color:#fca5a5}
.wrong-back-btn{padding:8px 18px;border-radius:8px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer;font-size:13px;transition:all .2s}
.wrong-back-btn:hover{border-color:#60a5fa;color:#60a5fa}
.wrong-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.wrong-nav button{padding:6px 16px;border-radius:6px;border:none;background:#334155;color:#94a3b8;cursor:pointer;font-size:13px}
.wrong-nav button:hover{background:#475569}
.wrong-nav button:disabled{opacity:.3;cursor:default}
.wrong-nav span{color:#94a3b8;font-size:13px}
@media(max-width:600px){.quiz-box{padding:14px}.quiz-option{padding:10px 12px;font-size:13px}.progress-bar{font-size:12px;gap:8px}}
</style>
</head>

<script>
const scenes=[
{id:"short-shot",title:"充填不足",icon:"⚡",scenario:"客户从A品牌M90换到心连心M90，第一模产品缺料——边角没填满。",steps:[{label:"问题现象",canvas:"shortshot",desc:"熔体没有完全充满模具型腔，产品边角缺失、轮廓不完整。这是换料后最常见的第一个问题。"},{label:"原因分析",canvas:"mfr-compare",desc:"不同厂家M90的MFR（熔融指数）存在差异。如果新料的MFR偏低，流动性就差一些。加上换料时参数没调整，自然充填不足。"},{label:"解决方案",canvas:"solution-shortshot",desc:"逐步提高注塑速度和料筒温度（每次+5℃，不超过210℃），适当增加注射压力。如果MFR差异太大，可考虑换用M270高流动牌号。"}],tips:"换料第一步：先查新旧料的MFR数据表，心里有数再调机。心连心POM的MFR稳定，批次间波动小，这是我们的优势。"},
{id:"silver-streak",title:"银丝/条纹",icon:"〰",scenario:"换料后产品表面出现银色或黑色条纹，客户很紧张：'这料是不是有问题？'",steps:[{label:"问题现象",canvas:"streak",desc:"产品表面出现银色或黑色条纹，沿流动方向分布。客户第一反应是'料有问题'，但其实多数情况是工艺参数没调好。"},{label:"原因分析",canvas:"degrade",desc:"银丝的根本原因是气体——温度过高或停留时间过长导致POM降解释放甲醛气体，或浇口处剪切热过高产生降解气。"},{label:"解决方案",canvas:"fix-streak",desc:"降低料筒温度（每次-5℃）、降低背压和螺杆转速、优化浇口横截面。确保充分干燥原料（80-90℃×3-4h）。"}],tips:"遇到银丝别慌，先查温度！POM加工温度窗口窄（180-210℃），高了就分解。告诉客户：这不是料的问题，是需要重新找到最佳温度点。"},
{id:"sink-mark",title:"缩孔/凹痕",icon:"◉",scenario:"换料后产品壁厚处出现表面凹陷（凹痕），或者切开发现内部有空洞（缩孔）。",steps:[{label:"问题现象",canvas:"sink",desc:"产品表面出现凹陷（凹痕），或内部形成空洞（缩孔）。多发生在壁厚较厚的区域、肋条根部、凸台附近。"},{label:"原因分析",canvas:"shrink",desc:"POM结晶度高，收缩率高达3.5%。不同厂家POM的收缩率可能有0.1-0.3%的微小差异。换料后如果保压参数不变，补缩不够就会出缩孔。"},{label:"解决方案",canvas:"fix-sink",desc:"提高保压压力（逐步+5bar）、延长保压时间（确保≥浇口封闭时间）、浇口设在厚壁区域。避免壁厚差异过大，肋厚建议为基本壁厚的0.5倍。"}],tips:"收缩率差异是换料的核心挑战。POM收缩率本身就大（3.5%），微小差异在精密件上就会放大。建议客户先做试模，用'产品重量法'确定最优保压时间。"},
{id:"warpage",title:"翘曲变形",icon:"◇",scenario:"产品脱模后放一段时间就变弯了，直边变成了弧形。",steps:[{label:"问题现象",canvas:"warp",desc:"产品无法保持所需形状，直边向内或向外扭曲。有时脱模时看着正常，放几分钟后才逐渐变形。"},{label:"原因分析",canvas:"stress",desc:"翘曲的根源是不均匀收缩。壁厚不均、模具温度不均、流道过长导致压力损失、结晶度差异——都会造成各方向收缩不一致。"},{label:"解决方案",canvas:"fix-warp",desc:"使壁厚尽量均匀、优化模具加热系统均衡各处温差、增加浇口数量缩短流道、适当控制保压压力。必要时进行退火处理消除内应力。"}],tips:"翘曲问题有时候不是换料引起的，而是模具本身设计的问题——换料只是让问题暴露出来了。帮客户解决翘曲，就是建立信任的最好机会。"},
{id:"burn",title:"烧焦",icon:"▪",scenario:"产品末端或角落出现黑色焦痕，像被火烧过一样。",steps:[{label:"问题现象",canvas:"burn",desc:"产品末端区域或截流区出现黑色/褐色焦痕。这是被压缩的高温空气灼烧熔体造成的，也叫Diesel Effect。"},{label:"原因分析",canvas:"air-trap",desc:"模具排气不佳，熔体填充时空气无法排出，被压缩到极小空间后温度急剧升高（可达500℃以上），灼烧POM熔体。"},{label:"解决方案",canvas:"fix-burn",desc:"优化模具排气系统（加排气槽）、在填充即将结束时降低注射速度、合理安排浇口位置。"}],tips:"烧焦问题80%是模具排气的问题，不是料的问题。但客户往往第一反应是'换料换出来的'。带着专业知识去现场，帮客户调好排气，信任感立刻建立。"},
{id:"mold-deposit",title:"模垢",icon:"▣",scenario:"生产几百模后，模具表面出现白色/褐色沉积物，产品表面开始变粗糙。",steps:[{label:"问题现象",canvas:"mold",desc:"模具表面形成附着物（模垢），导致产品表面出现瑕疵、尺寸精度降低、模具热传导能力下降。"},{label:"原因分析",canvas:"deposit-cause",desc:"模垢来源：树脂热分解、小分子助剂析出、色母载体析出、水口料分解形成低聚物。不同厂家POM的模垢增长速度差异极大。"},{label:"解决方案",canvas:"fix-mold",desc:"选择模垢增长慢的优质原料（心连心POM表现优秀）、定期清理保养模具、改善模具排气系统、控制加工温度不要过高。"}],tips:"模垢是体现POM品质差异的关键指标。可以跟客户分享测试数据：心连心POM的模垢增长速度属于'极慢'级别，能大幅减少停机清理次数，提高生产效率。"},
{id:"jetting",title:"喷射痕",icon:"⌇",scenario:"换料后产品表面出现蛇形纹路，从浇口延伸出去，像一条蛇爬过的痕迹。",steps:[{label:"问题现象",canvas:"jetting-problem",desc:"熔体从浇口高速射出，没有贴着模壁流动，而是像挤牙膏一样直接飞入型腔，形成蛇形纹路。产品表面从浇口开始有明显的波浪状条纹。"},{label:"原因分析",canvas:"jetting-cause",desc:"浇口位置不当（正对开阔型腔）、浇口截面太小、注射速度太快。熔体通过小浇口后突然进入大空间，失去壁面约束，产生自由射流。"},{label:"解决方案",canvas:"jetting-solution",desc:"调整浇口位置使其对准模壁、增大浇口截面、降低注射速度让熔体沿壁推进。也可采用扇形浇口或搭接浇口。"}],tips:"告诉客户喷射痕是浇口设计问题，调整浇口位置让熔体沿壁流动，或降低注射速度。心连心POM流动性好，适当降速不会影响充填。"},
{id:"weld-line",title:"熔接线",icon:"═",scenario:"产品表面有明显的一条线痕，像被刀划过的痕迹，强度也下降了。",steps:[{label:"问题现象",canvas:"weld-problem",desc:"两股熔体前沿相遇时没有完全融合，在产品表面形成一条可见的线痕。该处强度明显下降，有时还伴有V型缺口。"},{label:"原因分析",canvas:"weld-cause",desc:"多股熔体在型腔内汇合时温度已经降低，分子链无法充分缠结。注射速度过快或过慢、模温偏低、排气不良都会加剧熔接线。"},{label:"解决方案",canvas:"weld-solution",desc:"提高熔体和模具温度、优化注射速度、改善排气、重新布置浇口将熔接线移到不显眼的位置。必要时增加溢料井。"}],tips:"熔接线不可能完全消除，但可以通过调整浇口位置把它藏到看不见的地方。帮客户做模流分析，提前预判熔接线位置，展现专业能力。"},
{id:"flash",title:"飞边/溢边",icon:"▬",scenario:"产品边缘多出一圈薄片，像多了一圈'翅膀'，需要后续修整。",steps:[{label:"问题现象",canvas:"flash-problem",desc:"熔体从模具分型面或镶件间隙溢出，在产品边缘形成多余的薄片。严重时整圈都有飞边，影响尺寸精度和外观。"},{label:"原因分析",canvas:"flash-cause",desc:"锁模力不足、模具分型面损伤或变形、熔体温度过高导致粘度太低、注射速度/压力过大，都会让熔体挤入模具间隙。"},{label:"解决方案",canvas:"flash-solution",desc:"增大锁模力、修复模具分型面、降低熔体温度和注射压力/速度。检查模具是否变形，镶件配合是否紧密。"}],tips:"飞边问题先检查锁模力够不够，再看模具分型面有没有损伤。换料后如果新料流动性更好（MFR更高），需要适当降低注射压力。"},
{id:"demolding",title:"脱模困难",icon:"⊘",scenario:"产品卡在模具里拿不出来，硬顶出来又留下白色痕迹甚至开裂。",steps:[{label:"问题现象",canvas:"demold-problem",desc:"产品粘附在模具型腔内，顶针顶出后产品表面留下白色应力痕、顶针印，甚至出现裂纹。严重时产品直接卡在模腔里。"},{label:"原因分析",canvas:"demold-cause",desc:"顶出机构不足、模具表面粗糙、冷却时间不够、保压过高导致过填充、脱模斜度不够。换料后收缩率不同可能导致包紧力变化。"},{label:"解决方案",canvas:"demold-solution",desc:"增加顶针数量和面积、抛光模具表面、延长冷却时间、降低保压压力、增大脱模斜度。"}],tips:"脱模困难经常不是料的问题，而是模具设计的问题。帮客户分析原因，建立专业形象。心连心POM收缩率稳定，有利于脱模控制。"},
{id:"ripple",title:"涟漪纹",icon:"◎",scenario:"产品表面出现一圈一圈的纹路，像黑胶唱片一样，主要出现在流道末端。",steps:[{label:"问题现象",canvas:"ripple-problem",desc:"产品表面形成同心圆状的波纹沟槽，像唱片纹路。通常出现在熔体流动末端或壁厚突变区域，影响外观质量。"},{label:"原因分析",canvas:"ripple-cause",desc:"熔体温度和模温太低、注射速度太慢，导致熔体前沿以'走走停停'的方式推进。每次停顿都在表面留下一道痕迹。流道截面太小、流路过长也会加剧。"},{label:"解决方案",canvas:"ripple-solution",desc:"提高熔体和模具温度、增大注射速度、扩大流道截面。让熔体前沿保持连续稳定的推进速度。"}],tips:"涟漪纹主要出现在流道末端，提高温度和速度通常就能解决。告诉客户：这不是料的问题，是工艺参数需要重新匹配。"},
{id:"color-streak",title:"色绺",icon:"▧",scenario:"换料后产品颜色不均匀，一条一条的色差，客户质疑颜料品质。",steps:[{label:"问题现象",canvas:"color-problem",desc:"产品表面出现颜色深浅不一的条纹或条带，局部色差明显。换色或换料后尤其容易出现。"},{label:"原因分析",canvas:"color-cause",desc:"色母分散不均匀、材料被污染（混入异色料）、料筒或热流道死角残留旧料、螺杆混合能力不足。"},{label:"解决方案",canvas:"color-solution",desc:"选用与基料相容性好的色母、提高螺杆背压改善混合效果、彻底清洗料筒/喷嘴/热流道。换色时先用清洗料过渡。"}],tips:"换色时一定要彻底清洗料筒和热流道，死角的旧料会导致色差。建议客户准备专用清洗料，换色效率提高50%以上。"},
{id:"entrapped-air",title:"困气",icon:"○",scenario:"产品内部有气泡，或者表面有鼓包，切开能看到空洞。",steps:[{label:"问题现象",canvas:"entrap-problem",desc:"产品内部形成气泡或表面出现鼓包。与烧焦不同，困气不一定有焦痕，但内部有明显空腔，影响强度和外观。"},{label:"原因分析",canvas:"entrap-cause",desc:"模具设计导致空气被熔体包围而无法排出。排气系统不合理、排气槽堵塞、浇口位置使熔体形成包围结构。"},{label:"解决方案",canvas:"entrap-solution",desc:"用模流分析优化模具设计、改善排气系统（加排气槽/排气镶件）、定期清理排气通道、调整浇口位置避免气穴。"}],tips:"困气和烧焦经常一起出现，根本原因都是排气不良。帮客户做模流分析，提前预测困气位置，是最专业的服务方式。"}
];

let currentScene=0,currentStep=0,animFrame=null;
let quizState={answered:{},wrongList:[],wrongIdx:0,viewMode:'normal'};
function init(){
  const nav=document.getElementById('nav');
  scenes.forEach((s,i)=>{const b=document.createElement('button');b.className='nav-btn'+(i===0?' active':'');b.textContent=s.icon+' '+s.title;b.onclick=()=>switchScene(i);nav.appendChild(b)});
  document.getElementById('quizContainer').innerHTML='';
  updateProgress();
  renderScene();
}
function switchScene(idx){currentScene=idx;currentStep=0;quizState.viewMode='normal';document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));renderScene()}
function renderScene(){
  if(animFrame)cancelAnimationFrame(animFrame);
  const s=scenes[currentScene],main=document.getElementById('main'),step=s.steps[currentStep];
  let h='<div class="scene active"><div class="scenario-box"><h3><span class="icon">'+s.icon+'</span>'+s.title+'</h3><div class="scenario-tag red">换料场景</div><p style="font-size:15px;line-height:1.7;color:#cbd5e1">'+s.scenario+'</p></div>';
  h+='<div class="canvas-wrap"><canvas id="mainCanvas" width="860" height="360"></canvas></div>';
  h+='<div class="info-panel"><div class="step-indicator">';
  s.steps.forEach((_,i)=>{h+='<div class="step-dot'+(i===currentStep?' active':'')+'"></div>'});
  h+='</div><h3 style="margin-top:12px">'+step.label+'</h3><p>'+step.desc+'</p></div>';
  h+='<div class="step-nav">';
  if(currentStep>0)h+='<button class="step-btn prev" onclick="prevStep()">\u2190 上一步</button>';
  if(currentStep<s.steps.length-1)h+='<button class="step-btn next" onclick="nextStep()">下一步 \u2192</button>';
  if(currentStep===s.steps.length-1){
    h+='</div><div class="tip"><strong>\uD83D\uDCA1 销售话术：</strong>'+s.tips+'</div>';
    h+='<div id="quizArea"></div>';
    if(quizState.answered[currentScene]&&currentScene<scenes.length-1)h+='<div style="text-align:center;margin-top:12px"><button class="step-btn next" onclick="switchScene('+(currentScene+1)+')">下一个问题 \u2192</button></div>';
  }else h+='</div>';
  h+='</div>';
  main.innerHTML=h;
  document.getElementById('quizContainer').innerHTML='';
  updateProgress();
  if(currentStep===s.steps.length-1)renderQuiz(currentScene);
  startAnimation(step.canvas);
}
function nextStep(){currentStep++;renderScene()}
function prevStep(){currentStep--;renderScene()}

function updateProgress(){
  var pb=document.getElementById('progressBar');if(!pb)return;
  var total=scenes.length,done=Object.keys(quizState.answered).length,correct=0;
  for(var k in quizState.answered)if(quizState.answered[k].correct)correct++;
  var wl=quizState.wrongList.length;
  var h='<span class="stat">\u{1F4DD} 答题进度: <span class="stat-val">'+done+'/'+total+'</span></span>';
  h+='<span class="stat">\u2705 正确: <span class="stat-val">'+correct+'</span></span>';
  h+='<span class="stat">\u274C 错题: <span class="stat-val">'+wl+'</span></span>';
  if(wl>0)h+='<button class="wrong-btn" onclick="showWrongList()">\u{1F4D6} 错题集 <span class="badge">'+wl+'</span></button>';
  pb.innerHTML=h;
}

function renderQuiz(sceneIdx){
  var area=document.getElementById('quizArea');if(!area)return;
  var q=quizData[sceneIdx],ans=quizState.answered[sceneIdx];
  var h='<div class="quiz-box"><h4>\u{1F4DD} \u77E5\u8BC6\u68C0\u6D4B\uFF1A'+q.q+'</h4>';
  q.o.forEach(function(opt,i){
    var cls='quiz-option';
    if(ans){
      cls+=' disabled';
      if(i===q.a)cls+=' correct';
      else if(i===ans.selected&&i!==q.a)cls+=' wrong';
    }
    h+='<button class="'+cls+'" '+(ans?'disabled':'')+' onclick="answerQuiz('+sceneIdx+','+i+')">'+String.fromCharCode(65+i)+'. '+opt+'</button>';
  });
  if(ans){
    var fc=ans.correct?'correct':'wrong';
    var ic=ans.correct?'\u2705':'\u274C';
    h+='<div class="quiz-feedback '+fc+'">'+ic+' '+(ans.correct?'回答正确！':'回答错误！正确答案是 '+String.fromCharCode(65+q.a)+'。')+'<br><strong>解析：</strong>'+q.e+'</div>';
  }
  h+='</div>';
  area.innerHTML=h;
}

function answerQuiz(sceneIdx,selected){
  if(quizState.answered[sceneIdx])return;
  var q=quizData[sceneIdx],correct=selected===q.a;
  quizState.answered[sceneIdx]={correct:correct,selected:selected};
  if(!correct){
    var exists=false;
    for(var i=0;i<quizState.wrongList.length;i++){if(quizState.wrongList[i].sceneIdx===sceneIdx){exists=true;break;}}
    if(!exists)quizState.wrongList.push({sceneIdx:sceneIdx,selected:selected});
  }
  updateProgress();
  renderQuiz(sceneIdx);
  var s=scenes[sceneIdx];
  if(correct&&currentScene<scenes.length-1){
    var area=document.getElementById('quizArea');
    if(area)area.innerHTML+='<div style="text-align:center;margin-top:12px"><button class="step-btn next" onclick="switchScene('+(currentScene+1)+')">下一个问题 \u2192</button></div>';
  }
}

function showWrongList(){
  if(quizState.wrongList.length===0)return;
  quizState.viewMode='wrong';quizState.wrongIdx=0;
  if(animFrame)cancelAnimationFrame(animFrame);
  var main=document.getElementById('main');
  main.innerHTML='<div class="wrong-panel"><div class="wrong-header"><h3>\u{1F4D6} 错题集</h3><button class="wrong-back-btn" onclick="backToNormal()">\u2190 返回</button></div><div id="wrongContent"></div></div>';
  document.getElementById('quizContainer').innerHTML='';
  updateProgress();
  renderWrongItem();
}

function renderWrongItem(){
  var item=quizState.wrongList[quizState.wrongIdx];if(!item)return;
  var sceneIdx=item.sceneIdx,q=quizData[sceneIdx],s=scenes[sceneIdx];
  var wc=document.getElementById('wrongContent');if(!wc)return;
  var h='<div class="wrong-nav"><button onclick="wrongPrev()" '+(quizState.wrongIdx===0?'disabled':'')+'>\u2190 上一题</button><span>'+String.fromCharCode(65+quizState.wrongIdx)+' ('+quizState.wrongIdx+1+'/'+quizState.wrongList.length+')</span><button onclick="wrongNext()" '+(quizState.wrongIdx===quizState.wrongList.length-1?'disabled':'')+'>下一题 \u2192</button></div>';
  h+='<div class="scenario-box"><h3><span class="icon">'+s.icon+'</span>'+s.title+'</h3><p style="font-size:14px;color:#cbd5e1;margin-top:8px">'+s.scenario+'</p></div>';
  h+='<div class="canvas-wrap"><canvas id="mainCanvas" width="860" height="360"></canvas></div>';
  h+='<div class="quiz-box"><h4>\u{1F4DD} '+q.q+'</h4>';
  q.o.forEach(function(opt,i){
    var cls='quiz-option disabled';
    if(i===q.a)cls+=' correct';
    else if(i===item.selected&&i!==q.a)cls+=' wrong';
    h+='<button class="'+cls+'" disabled>'+String.fromCharCode(65+i)+'. '+opt+'</button>';
  });
  h+='<div class="quiz-feedback wrong">\u274C 你的答案：'+String.fromCharCode(65+item.selected)+' | 正确答案：'+String.fromCharCode(65+q.a)+'<br><strong>解析：</strong>'+q.e+'</div></div>';
  wc.innerHTML=h;
  startAnimation(s.steps[s.steps.length-1].canvas);
}

function wrongPrev(){if(quizState.wrongIdx>0){quizState.wrongIdx--;renderWrongItem()}}
function wrongNext(){if(quizState.wrongIdx<quizState.wrongList.length-1){quizState.wrongIdx++;renderWrongItem()}}
function backToNormal(){quizState.viewMode='normal';renderScene()}

function startAnimation(type){
  const canvas=document.getElementById('mainCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');let t=0;
  function loop(){t+=0.016;ctx.clearRect(0,0,860,360);
    if(window['draw_'+type.replace(/-/g,'_')])window['draw_'+type.replace(/-/g,'_')](ctx,t);
    animFrame=requestAnimationFrame(loop);
  }loop();
}
function drawLabel(ctx,text,x,y,color,size){ctx.font='bold '+(size||14)+'px "Microsoft YaHei"';ctx.fillStyle=color||'#e2e8f0';ctx.textAlign='center';ctx.fillText(text,x,y)}
function drawArrow(ctx,x1,y1,x2,y2,color){const a=Math.atan2(y2-y1,x2-x1);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=color||'#60a5fa';ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-10*Math.cos(a-.5),y2-10*Math.sin(a-.5));ctx.lineTo(x2-10*Math.cos(a+.5),y2-10*Math.sin(a+.5));ctx.closePath();ctx.fillStyle=color||'#60a5fa';ctx.fill()}
